simplipy_engine: 'dev_7-3'
holdout_pools: [
  "{{ROOT}}/data/ansr-data/v23.x/skeleton_pool_val/",
  "{{ROOT}}/data/ansr-data/test_set/fastsrb/skeleton_pool/"]

sample_strategy:
  n_operator_distribution: "length_exponential"
  min_operators: 0
  max_operators: 17
  power: 0.7
  lambda: 1
  max_length: 35
  max_tries: 4
  independent_dimensions: true

allow_nan: false
simplify: true

# v23.7 = BOTH WIDENED (2026-06-21). A/B pair with v23.6 (= X-only widened). Tests whether widening the
# CONSTANT cauchy too (5->10) helps fastsrb hard/OOD problems, or just pays the in-range cost v23.1 showed.
# Advisor caution: the X-input cauchy is the evidence-backed win; the constant-widen is the open question
# this pair answers. Both widen X 10->20; v23.7 additionally widens constants 5->10. User to confirm scales.
literal_prior:
  name: 'cauchy'
  kwargs:
    loc: 0
    scale: 10  # v23.7: constants WIDENED 5->10 (vs v23.6 which keeps 5). The A/B variable.

support_sampler:
  support_prior:
    name: "sampler"
    kwargs:
      base_dist_name: "uniform"
      param_samplers:
        low:
          name: "cauchy"
          kwargs: {loc: 0, scale: 20}  # was 10 (v23.2); X-input widening = the win axis
        high:
          name: "cauchy"
          kwargs: {loc: 0, scale: 20}  # was 10 (v23.2)
  n_support_prior:
    name: "uniform"
    kwargs:
      low: 1
      high: 1024
      min_value: 1
      max_value: 1024

variables: ['x1', 'x2', 'x3', 'x4', 'x5', 'x6', 'x7', 'x8', 'x9', 'x10', 'x11', 'x12', 'x13', 'x14', 'x15', 'x16', 'x17']

operator_weights:
  "+": 10
  "-": 10
  "*": 10
  "/": 10
  abs: 1
  inv: 1
  neg: 1
  pow2: 1
  pow3: 1
  pow4: 1
  pow5: 1
  pow1_2: 1
  pow1_3: 1
  pow1_4: 1
  pow1_5: 1
  sin: 1
  cos: 1
  tan: 1
  asin: 1
  acos: 1
  atan: 1
  sinh: 1
  cosh: 1
  tanh: 1
  asinh: 1
  acosh: 1
  atanh: 1
  exp: 1
  log: 1
  mult2: 1
  mult3: 1
  mult4: 1
  mult5: 1
  div2: 1
  div3: 1
  div4: 1
  div5: 1
