simplipy_engine: 'dev_7-3'
tokenizer: './tokenizer.yaml'

pre_encoder_noise_scale: 0.1

encoder_max_n_variables: 18
encoder_dim: 640
encoder_n_heads: 10
encoder_n_isab: 5
encoder_n_sab: 5
encoder_n_inducing_points: 128
encoder_n_seeds: 128
encoder_ffn_hidden_dim: 1920
encoder_dropout: 0.1
encoder_attn_norm: 'rms_set'
encoder_ffn_norm: 'rms_set'
encoder_output_norm: 'rms_set'

decoder_input_dim: 640
decoder_model_dim: 640
decoder_n_heads: 10
decoder_n_layers: 10
decoder_max_seq_len: 128
decoder_ffn_hidden_dim: 1920
decoder_dropout: 0.1
decoder_block_self_attn_norm: 'rms'
decoder_block_cross_attn_norm: 'rms'
decoder_block_ffn_norm: 'rms'
decoder_cross_attn_kv_norm: 'rms'
decoder_output_norm: 'rms'
decoder_use_rope_self_attn: true
decoder_use_rope_cross_attn: false
decoder_use_xsa_self_attn: true  # XSA (arXiv:2603.09078), decoder causal self-attn only. NOTE: raises in forward_static -> DISABLES KV-cache fast decode until the "fresh own-value" fix lands. Enabled per user (2026-06-21); user owns the fix + reassessing XSA's value.

use_checkpointing: false