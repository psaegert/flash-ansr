        generation_overrides:
          kwargs:
            choices: 16384
      runner:
        <<: *flash_ansr_val_runner
        output: "{{ROOT}}/results/evaluation/scaling/v23.4-120M-pilot/val/pilot_c16384_frac_005.pkl"
  pilot_c16384_frac_025:
