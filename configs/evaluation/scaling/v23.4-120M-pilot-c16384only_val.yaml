defaults:
  data_source: &flash_ansr_val_source
    type: skeleton_dataset
    dataset: "{{ROOT}}/configs/v23.0-120M/dataset_val.yaml"
    datasets_per_expression: 1
    n_support: 512
    noise_level: 0.0
    max_trials: 100
    target_size: 50
  model_adapter: &flash_ansr_adapter
    type: flash_ansr
    model_path: "{{ROOT}}/models/ansr-models/v23.0-120M"
    evaluation_config:
      n_support: 512
      n_restarts: 8
      refiner_method: curve_fit_lm
      refiner_p0_noise: normal
      refiner_p0_noise_kwargs:
        loc: 0.0
        scale: 5
      length_penalty: 0.05
      constants_penalty: 0.0
      likelihood_penalty: 0.0
      prune_constant_budget: 0
      generation_config:
        method: softmax_sampling
        kwargs:
          choices: 32
          top_k: 0
          top_p: 1
          max_len: 64
          batch_size: 512
          temperature: 1
          valid_only: true
          simplify: true
          unique: true
          use_cache: true
      device: cuda
    complexity: none
    device: cuda
  runner: &flash_ansr_val_runner
    save_every: 64
    resume: true

experiments:
  pilot_c16384_abs_000:
    run:
      data_source:
        <<: *flash_ansr_val_source
        target_size: 50
      model_adapter:
        <<: *flash_ansr_adapter
        evaluation_overrides:
          prune_constant_budget: 0
        generation_overrides:
          kwargs:
            choices: 16384
      runner:
        <<: *flash_ansr_val_runner
        output: "{{ROOT}}/results/evaluation/scaling/v23.4-120M-pilot/val/pilot_c16384_abs_000.pkl"
  pilot_c16384_abs_064:
    run:
      data_source:
        <<: *flash_ansr_val_source
        target_size: 50
      model_adapter:
        <<: *flash_ansr_adapter
        evaluation_overrides:
          prune_constant_budget: 64
        generation_overrides:
          kwargs:
            choices: 16384
      runner:
        <<: *flash_ansr_val_runner
        output: "{{ROOT}}/results/evaluation/scaling/v23.4-120M-pilot/val/pilot_c16384_abs_064.pkl"
  pilot_c16384_abs_256:
    run:
      data_source:
        <<: *flash_ansr_val_source
        target_size: 50
      model_adapter:
        <<: *flash_ansr_adapter
        evaluation_overrides:
          prune_constant_budget: 256
        generation_overrides:
          kwargs:
            choices: 16384
      runner:
        <<: *flash_ansr_val_runner
        output: "{{ROOT}}/results/evaluation/scaling/v23.4-120M-pilot/val/pilot_c16384_abs_256.pkl"
  pilot_c16384_frac_005:
    run:
      data_source:
        <<: *flash_ansr_val_source
        target_size: 50
      model_adapter:
        <<: *flash_ansr_adapter
