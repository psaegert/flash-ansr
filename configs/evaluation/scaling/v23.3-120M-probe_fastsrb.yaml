# Gen/refine split + clean KV-cache diagnostic probe (v23.3-120M).
# 5 c-values x {cache_on, cache_off}, dedicated GPU, paired first-N problems
# (runner.limit -> true prefix, same random_state=42 source everywhere).
# Instrumented fit() records generation_time + refinement_time per row, so:
#   - cache_on alone -> the generation-vs-refinement split (where time goes).
#   - cache_on vs cache_off (same code path; batching cancels) -> pure KV-cache
#     effect on the generation slice.
# c=64 hits the legacy single-shot path (c<=batch_size=128); c>=256 hits the
# new outer batched loop. Graduated limits keep the high-c cells affordable.
defaults:
  data_source: &src
    type: fastsrb
    benchmark_path: "{{ROOT}}/data/ansr-data/test_set/fastsrb/expressions.yaml"
    datasets_per_expression: 10
    support_points: 512
    sample_points: 1024
    method: random
    max_trials: 100
    incremental: false
    random_state: 42
    noise_level: 0.0
  model_adapter: &adapter
    type: flash_ansr
    model_path: "{{ROOT}}/models/ansr-models/v23.0-120M"
    evaluation_config:
      n_support: 512
      n_restarts: 8
      refiner_method: curve_fit_lm
      refiner_p0_noise: normal
      refiner_p0_noise_kwargs:
        loc: 0.0
        scale: 5
      length_penalty: 0.05
      constants_penalty: 0.0
      likelihood_penalty: 0.0
      prune_constant_budget: 0
      generation_config:
        method: softmax_sampling
        kwargs:
          choices: 32
          top_k: 0
          top_p: 1
          max_len: 64
          batch_size: 128
          temperature: 1
          valid_only: true
          simplify: true
          unique: true
          use_cache: true
      device: cuda
    complexity: none
    device: cuda
  runner: &runner
    save_every: 64
    resume: true

experiments:
  # ---------- cache ON (= v23.3 condition C) ----------
  probe_on_00064:
    run:
      data_source: *src
      model_adapter: { <<: *adapter, generation_overrides: { kwargs: { choices: 64, use_cache: true } } }
      runner: { <<: *runner, limit: 200, output: "{{ROOT}}/results/evaluation/scaling/v23.3-120M-probe/cache_on/choices_00064.pkl" }
  probe_on_00256:
    run:
      data_source: *src
      model_adapter: { <<: *adapter, generation_overrides: { kwargs: { choices: 256, use_cache: true } } }
      runner: { <<: *runner, limit: 200, output: "{{ROOT}}/results/evaluation/scaling/v23.3-120M-probe/cache_on/choices_00256.pkl" }
  probe_on_01024:
    run:
      data_source: *src
      model_adapter: { <<: *adapter, generation_overrides: { kwargs: { choices: 1024, use_cache: true } } }
      runner: { <<: *runner, limit: 200, output: "{{ROOT}}/results/evaluation/scaling/v23.3-120M-probe/cache_on/choices_01024.pkl" }
  probe_on_04096:
    run:
      data_source: *src
      model_adapter: { <<: *adapter, generation_overrides: { kwargs: { choices: 4096, use_cache: true } } }
      runner: { <<: *runner, limit: 100, output: "{{ROOT}}/results/evaluation/scaling/v23.3-120M-probe/cache_on/choices_04096.pkl" }
  probe_on_16384:
    run:
      data_source: *src
      model_adapter: { <<: *adapter, generation_overrides: { kwargs: { choices: 16384, use_cache: true } } }
      runner: { <<: *runner, limit: 50, output: "{{ROOT}}/results/evaluation/scaling/v23.3-120M-probe/cache_on/choices_16384.pkl" }

  # ---------- cache OFF (= control B: new code path, KV cache disabled) ----------
  probe_off_00064:
    run:
      data_source: *src
      model_adapter: { <<: *adapter, generation_overrides: { kwargs: { choices: 64, use_cache: false } } }
      runner: { <<: *runner, limit: 200, output: "{{ROOT}}/results/evaluation/scaling/v23.3-120M-probe/cache_off/choices_00064.pkl" }
  probe_off_00256:
    run:
      data_source: *src
      model_adapter: { <<: *adapter, generation_overrides: { kwargs: { choices: 256, use_cache: false } } }
      runner: { <<: *runner, limit: 200, output: "{{ROOT}}/results/evaluation/scaling/v23.3-120M-probe/cache_off/choices_00256.pkl" }
  probe_off_01024:
    run:
      data_source: *src
      model_adapter: { <<: *adapter, generation_overrides: { kwargs: { choices: 1024, use_cache: false } } }
      runner: { <<: *runner, limit: 200, output: "{{ROOT}}/results/evaluation/scaling/v23.3-120M-probe/cache_off/choices_01024.pkl" }
  probe_off_04096:
    run:
      data_source: *src
      model_adapter: { <<: *adapter, generation_overrides: { kwargs: { choices: 4096, use_cache: false } } }
      runner: { <<: *runner, limit: 100, output: "{{ROOT}}/results/evaluation/scaling/v23.3-120M-probe/cache_off/choices_04096.pkl" }
  probe_off_16384:
    run:
      data_source: *src
      model_adapter: { <<: *adapter, generation_overrides: { kwargs: { choices: 16384, use_cache: false } } }
      runner: { <<: *runner, limit: 50, output: "{{ROOT}}/results/evaluation/scaling/v23.3-120M-probe/cache_off/choices_16384.pkl" }
