model: ../v23.0-20M/model.yaml

optimizer:
  name: AdamW
  kwargs:
    lr: 1  # Will be multiplied by scheduler
    weight_decay: 0.01
    betas: [0.9, 0.95]

lr_schedule:
  - [0, 0.0]
  - [8192, 1e-4]    # 10% warmup
  - [65536, 1e-4]
  - [81920, 0.0]    # 20% cooldown

batch_size: 128

train_dataset: ./dataset_train.yaml
val_dataset: "../v23.0-20M/dataset_val.yaml"
val_batch_size: 128
val_size: 100_000

compile_mode: 'reduce-overhead'
gradient_checkpointing: False
preprocess: false

wandb_watch_log: null
wandb_watch_log_freq: 1000

steps: 81920
device: cuda
